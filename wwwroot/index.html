<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Todo App</title>
    <meta name="description" content="A minimal full-stack Todo App built with .NET 8">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>My Daily Tasks</h1>
            <p class="subtitle">Stay organized, stay focused.</p>
        </header>

        <div class="input-group">
            <input type="text" id="todoInput" placeholder="What do you need to do?" autocomplete="off">
            <button class="add-btn" id="addBtn">Add Task</button>
        </div>

        <ul class="todo-list" id="todoList">
            <!-- Todos will be injected here via JavaScript -->
        </ul>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
